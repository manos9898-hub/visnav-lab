<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VisNav GT Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0c0b;
      --surface:  #131512;
      --surface2: #1a1d1b;
      --border:   #252825;
      --text:     #d4d8d4;
      --muted:    #6b7468;
      --green:    #22c55e;
      --green-dim:rgba(34,197,94,0.15);
      --red:      #ef4444;
      --red-dim:  rgba(239,68,68,0.15);
      --amber:    #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; }

    /* ── PICKER ─────────────────────────────────────────────── */
    #picker { display: flex; flex-direction: column; height: 100%; }
    .picker-header { padding: 2rem 1.5rem 1.25rem; border-bottom: 1px solid var(--border); }
    .picker-title  { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--green); letter-spacing: -0.03em; line-height: 1; }
    .picker-sub    { font-size: 0.65rem; color: var(--muted); margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.12em; }
    .session-list  { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .session-card  { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; cursor: pointer; transition: border-color 0.15s; }
    .session-card:hover  { border-color: var(--green); }
    .session-card:active { background: var(--surface2); }
    .s-uuid  { font-size: 0.6rem; color: var(--muted); margin-bottom: 0.6rem; word-break: break-all; }
    .s-stats { display: flex; gap: 1.5rem; margin-bottom: 0.75rem; }
    .s-stat  { display: flex; flex-direction: column; gap: 0.1rem; }
    .s-val   { font-size: 1rem; font-weight: 500; color: var(--text); }
    .s-lbl   { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .s-bar   { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .s-fill  { height: 100%; background: var(--green); }
    .s-foot  { font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .empty   { padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: 0.75rem; line-height: 2; }

    /* ── REVIEW ─────────────────────────────────────────────── */
    #review { display: none; flex-direction: column; height: 100%; }

    .rev-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .back-btn   { background: none; border: none; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.7rem; padding: 0.2rem 0; flex-shrink: 0; }
    .back-btn:hover { color: var(--text); }
    .rev-prog   { flex: 1; min-width: 0; }
    .rev-count  { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rev-bar    { height: 2px; background: var(--border); border-radius: 1px; }
    .rev-fill   { height: 100%; background: var(--green); transition: width 0.25s; }
    .save-btn   { border: 1px solid var(--border); background: none; color: var(--muted); font-family: inherit; font-size: 0.65rem; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
    .save-btn.dirty  { border-color: var(--amber); color: var(--amber); }
    .save-btn:active { opacity: 0.7; }

    .frame-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0.5rem; overflow: hidden; }
    .frame-wrap { position: relative; height: 100%; width: auto; aspect-ratio: 3/4; max-width: 100%; }
    #frame-img  { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 4px; background: var(--surface); }
    #overlay    { position: absolute; inset: 0; pointer-events: none; border-radius: 4px; width: 100%; height: 100%; }
    .f-loader   { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.7rem; }

    .frame-meta { flex-shrink: 0; padding: 0.4rem 1rem; display: flex; align-items: center; justify-content: space-between; }
    .f-num  { font-size: 0.65rem; color: var(--muted); }
    .f-badge { font-size: 0.6rem; font-weight: 500; padding: 0.2rem 0.5rem; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.07em; }
    .b-unreviewed { color: var(--muted);  background: var(--border); }
    .b-accepted   { color: var(--green);  background: var(--green-dim); }
    .b-rejected   { color: var(--red);    background: var(--red-dim); }
    .b-corrected  { color: var(--amber);  background: rgba(245,158,11,.15); }

    .controls { flex-shrink: 0; padding: 0.5rem 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .nav-row    { display: flex; gap: 0.5rem; }
    .action-row { display: flex; gap: 0.5rem; }
    .btn { flex: 1; border: none; border-radius: 6px; padding: 0.75rem; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500; }
    .btn:active { opacity: 0.75; }
    .btn-nav    { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }
    .btn-accept { background: var(--green); color: #000; }
    .btn-reject { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }

    /* keyboard hint */
    .key-hint { text-align: center; font-size: 0.55rem; color: var(--muted); margin-top: 0.25rem; letter-spacing: 0.06em; }
  </style>
</head>
<body>

<!-- ═══ PICKER ═══════════════════════════════════════════════════ -->
<div id="picker">
  <div class="picker-header">
    <div class="picker-title">VisNav GT</div>
    <div class="picker-sub">Ground Truth Review</div>
  </div>
  <div id="session-list" class="session-list">
    <div class="empty">Loading sessions…</div>
  </div>
</div>

<!-- ═══ REVIEW ════════════════════════════════════════════════════ -->
<div id="review">
  <div class="rev-header">
    <button class="back-btn" onclick="showPicker()">← Sessions</button>
    <div class="rev-prog">
      <div class="rev-count" id="rev-count">— / —</div>
      <div class="rev-bar"><div class="rev-fill" id="rev-fill" style="width:0%"></div></div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveLabels()">Save</button>
  </div>

  <div class="frame-area">
    <div class="frame-wrap" id="frame-wrap">
      <img id="frame-img" alt="">
      <canvas id="overlay"></canvas>
      <div class="f-loader" id="f-loader">loading…</div>
    </div>
  </div>

  <div class="frame-meta">
    <span class="f-num" id="f-num">frame —</span>
    <span class="f-badge b-unreviewed" id="f-badge">unreviewed</span>
  </div>

  <div class="controls">
    <div class="nav-row">
      <button class="btn btn-nav" id="btn-prev" onclick="navigate(-1)">← prev</button>
      <button class="btn btn-nav" id="btn-next" onclick="navigate(1)">next →</button>
    </div>
    <div class="action-row">
      <button class="btn btn-accept" onclick="doAccept()">✓ Accept</button>
      <button class="btn btn-reject" onclick="doReject()">✗ Reject</button>
    </div>
    <div class="key-hint">A = accept · R = reject · ← → = navigate · S = save</div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  uuid: null,
  manifest: null,   // {frames: [{frame_number, clear_polygon, ...}]}
  labels: {},       // {[frame_number]: {status, clear_polygon, obstacles}}
  idx: 0,           // index into manifest.frames
  dirty: false,
  autoCount: 0,
};

// ── Elements ───────────────────────────────────────────────────────────────
const el = id => document.getElementById(id);
const frameImg = el('frame-img');
const overlay  = el('overlay');
const ctx      = overlay.getContext('2d');

// ── Picker ─────────────────────────────────────────────────────────────────
async function loadSessions() {
  const list = el('session-list');
  list.innerHTML = '<div class="empty">Loading sessions…</div>';
  try {
    const sessions = await fetch('/api/sessions').then(r => r.json());
    if (!sessions.length) {
      list.innerHTML = '<div class="empty">No sessions ready to review.<br>Run Plan B first (gt_select_clips → gt_overlay).</div>';
      return;
    }
    list.innerHTML = sessions.map(s => {
      const pct = s.n_frames_selected
        ? Math.round(s.n_reviewed / s.n_frames_selected * 100) : 0;
      return `
        <div class="session-card" onclick="openSession('${s.uuid}')">
          <div class="s-uuid">${s.uuid}</div>
          <div class="s-stats">
            <div class="s-stat"><div class="s-val">${s.n_frames_selected||0}</div><div class="s-lbl">frames</div></div>
            <div class="s-stat"><div class="s-val">${s.n_clips||0}</div><div class="s-lbl">clips</div></div>
            <div class="s-stat"><div class="s-val">${s.n_reviewed||0}</div><div class="s-lbl">reviewed</div></div>
          </div>
          <div class="s-bar"><div class="s-fill" style="width:${pct}%"></div></div>
          <div class="s-foot">${s.stage||'overlaid'} · ${pct}% reviewed</div>
        </div>`;
    }).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty">Could not reach the API.<br>${e.message}</div>`;
  }
}

function showPicker() {
  if (S.dirty) saveLabels();
  document.removeEventListener('keydown', onKey);
  el('picker').style.display = 'flex';
  el('review').style.display = 'none';
  loadSessions();
}

// ── Open session ───────────────────────────────────────────────────────────
async function openSession(uuid) {
  S.uuid = uuid;
  el('picker').style.display = 'none';
  el('review').style.display = 'flex';

  const [manifest, saved] = await Promise.all([
    fetch(`/api/session/${uuid}/manifest`).then(r => r.json()),
    fetch(`/api/session/${uuid}/labels`).then(r => r.json()).catch(() => null),
  ]);

  S.manifest   = manifest;
  S.labels     = {};
  S.idx        = 0;
  S.autoCount  = 0;
  setDirty(false);

  manifest.frames.forEach(f => {
    const fn = String(f.frame_number);
    const sv = saved?.frames?.[fn];
    S.labels[fn] = sv || {
      status: 'unreviewed',
      clear_polygon: f.clear_polygon || [],
      obstacles: [],
    };
  });

  // Start at first unreviewed frame
  const firstUnreviewed = manifest.frames.findIndex(
    f => S.labels[String(f.frame_number)].status === 'unreviewed'
  );
  S.idx = firstUnreviewed >= 0 ? firstUnreviewed : 0;

  document.addEventListener('keydown', onKey);
  renderFrame();
}

// ── Frame rendering ────────────────────────────────────────────────────────
function navigate(delta) {
  const next = S.idx + delta;
  if (next < 0 || next >= S.manifest.frames.length) return;
  S.idx = next;
  renderFrame();
}

function renderFrame() {
  const frames  = S.manifest.frames;
  const f       = frames[S.idx];
  const fn      = String(f.frame_number);
  const label   = S.labels[fn];
  const reviewed = Object.values(S.labels).filter(l => l.status !== 'unreviewed').length;
  const total   = frames.length;

  // Header
  el('rev-count').textContent = `${S.idx + 1} / ${total}  ·  ${reviewed} reviewed`;
  el('rev-fill').style.width  = (reviewed / total * 100) + '%';

  // Nav
  el('btn-prev').disabled = S.idx === 0;
  el('btn-next').disabled = S.idx === total - 1;

  // Meta
  el('f-num').textContent = `frame ${f.frame_number}`;
  setBadge(label.status);

  // Image
  el('f-loader').style.display = 'flex';
  clearCanvas();
  frameImg.onload = () => {
    el('f-loader').style.display = 'none';
    const poly = label.status === 'rejected' ? null : label.clear_polygon;
    drawOverlay(poly, label.status === 'rejected');
  };
  frameImg.onerror = () => {
    el('f-loader').textContent = 'image not found';
  };
  frameImg.src = `/api/session/${S.uuid}/frame/${f.frame_number}`;
}

function drawOverlay(polygon, isRejected) {
  const wrap = el('frame-wrap');
  const rect = wrap.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;

  overlay.width  = rect.width  * dpr;
  overlay.height = rect.height * dpr;
  overlay.style.width  = rect.width  + 'px';
  overlay.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);

  if (isRejected) {
    ctx.fillStyle = 'rgba(239,68,68,0.22)';
    ctx.fillRect(0, 0, rect.width, rect.height);
    return;
  }
  if (!polygon || polygon.length < 3) return;

  ctx.beginPath();
  ctx.moveTo(polygon[0][0] * rect.width, polygon[0][1] * rect.height);
  for (let i = 1; i < polygon.length; i++) {
    ctx.lineTo(polygon[i][0] * rect.width, polygon[i][1] * rect.height);
  }
  ctx.closePath();
  ctx.fillStyle   = 'rgba(34,197,94,0.28)';
  ctx.strokeStyle = 'rgba(34,197,94,0.85)';
  ctx.lineWidth   = 2;
  ctx.fill();
  ctx.stroke();
}

function clearCanvas() {
  overlay.width = overlay.height = 0;
}

function setBadge(status) {
  const b = el('f-badge');
  b.className   = `f-badge b-${status}`;
  b.textContent = status;
}

// ── Actions ────────────────────────────────────────────────────────────────
function doAccept() {
  const fn = String(S.manifest.frames[S.idx].frame_number);
  S.labels[fn].status = 'accepted';
  setDirty(true);
  setBadge('accepted');
  maybeAutoSave();
  advanceToUnreviewed();
}

function doReject() {
  const fn = String(S.manifest.frames[S.idx].frame_number);
  S.labels[fn].status = 'rejected';
  setDirty(true);
  setBadge('rejected');
  drawOverlay(null, true);
  maybeAutoSave();
  advanceToUnreviewed();
}

function advanceToUnreviewed() {
  const frames = S.manifest.frames;
  // Look forward first
  for (let i = S.idx + 1; i < frames.length; i++) {
    if (S.labels[String(frames[i].frame_number)].status === 'unreviewed') {
      S.idx = i; renderFrame(); return;
    }
  }
  // Then backward
  for (let i = S.idx - 1; i >= 0; i--) {
    if (S.labels[String(frames[i].frame_number)].status === 'unreviewed') {
      S.idx = i; renderFrame(); return;
    }
  }
  // All done — stay, refresh header
  const reviewed = Object.values(S.labels).filter(l => l.status !== 'unreviewed').length;
  el('rev-count').textContent = `${S.idx + 1} / ${frames.length}  ·  ${reviewed} reviewed — all done!`;
}

// ── Save ───────────────────────────────────────────────────────────────────
function setDirty(val) {
  S.dirty = val;
  const btn = el('save-btn');
  btn.classList.toggle('dirty', val);
  btn.textContent = val ? 'Save *' : 'Save';
}

function maybeAutoSave() {
  if (++S.autoCount >= 15) { S.autoCount = 0; saveLabels(); }
}

async function saveLabels() {
  if (!S.uuid || !S.dirty) return;
  el('save-btn').textContent = 'Saving…';
  try {
    const resp = await fetch(`/api/session/${S.uuid}/labels`, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({frames: S.labels}),
    });
    if (!resp.ok) throw new Error(resp.statusText);
    setDirty(false);
  } catch (e) {
    el('save-btn').textContent = 'Error — retry';
    setTimeout(() => { if (S.dirty) setDirty(true); }, 2000);
  }
}

// ── Keyboard ───────────────────────────────────────────────────────────────
function onKey(e) {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { e.preventDefault(); navigate(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp'){ e.preventDefault(); navigate(-1); }
  else if (e.key.toLowerCase() === 'a') doAccept();
  else if (e.key.toLowerCase() === 'r') doReject();
  else if (e.key.toLowerCase() === 's') saveLabels();
}

// ── Start ──────────────────────────────────────────────────────────────────
loadSessions();
</script>
</body>
</html>
